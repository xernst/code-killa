solution: |
  prompts = [
      {"name": "support-triage-v1",     "has_role": True,  "has_task": True, "has_context": True,  "has_format": True,  "has_examples": True},
      {"name": "contract-summary-v2",   "has_role": True,  "has_task": True, "has_context": True,  "has_format": True,  "has_examples": False},
      {"name": "marketing-blurb-draft", "has_role": True,  "has_task": True, "has_context": False, "has_format": True,  "has_examples": False},
      {"name": "deposition-summary-v0", "has_role": False, "has_task": True, "has_context": True,  "has_format": False, "has_examples": False},
      {"name": "tell-me-everything",    "has_role": False, "has_task": True, "has_context": False, "has_format": False, "has_examples": False},
  ]

  KNOBS = ["has_role", "has_task", "has_context", "has_format", "has_examples"]

  def score_prompts(prompts):
      results = []
      for p in prompts:
          score = sum(20 for k in KNOBS if p.get(k))
          missing = [k for k in KNOBS if not p.get(k)]
          results.append((p["name"], score, missing))
      results.sort(key=lambda row: -row[1])
      return results

  for row in score_prompts(prompts):
      print(row)
