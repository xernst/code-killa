xp: 5
estSeconds: 280
concept: build-your-own-30-day-plan
prompt: |
  Write `make_30_day_plan(profile)` that takes a profile dict and
  returns a plan dict.

  Profile shape:
  ```
  {"background": "engineer" | "copywriter" | "cs_rep" | "designer" | "paralegal",
   "hours_per_week": int}
  ```

  Return shape:
  ```
  {"starting_chapter": int,
   "weekly_chapters": int,
   "target_chapter_at_30_days": int,
   "skip_list": list[int]}
  ```

  Rules:

  - Engineer: starts at ch04 (skip ch01-03 basic syntax),
    skip_list = [1, 2, 3], weekly_chapters = max(2, hours_per_week // 5).
  - Copywriter, cs_rep, paralegal: start at ch01, skip_list = [],
    weekly_chapters = max(1, hours_per_week // 8).
  - Designer: start at ch01, skip_list = [], weekly_chapters
    = max(1, hours_per_week // 7) (slightly faster than copywriter —
    designers already have prompt-engineering reps from image tools).
  - target_chapter_at_30_days = min(30, starting_chapter + 4 *
    weekly_chapters - 1) (four weeks of progress, capped at ch30).

  Two profiles to run. Expected output:
  ```
  engineer @ 20 hrs/wk: {'starting_chapter': 4, 'weekly_chapters': 4, 'target_chapter_at_30_days': 19, 'skip_list': [1, 2, 3]}
  copywriter @ 10 hrs/wk: {'starting_chapter': 1, 'weekly_chapters': 1, 'target_chapter_at_30_days': 4, 'skip_list': []}
  ```
starter: |
  engineer = {"background": "engineer", "hours_per_week": 20}
  copywriter = {"background": "copywriter", "hours_per_week": 10}

  # define make_30_day_plan(profile) below

  print(f"engineer @ 20 hrs/wk: {make_30_day_plan(engineer)}")
  print(f"copywriter @ 10 hrs/wk: {make_30_day_plan(copywriter)}")
grader:
  kind: stdout-equality
  expected: |
    engineer @ 20 hrs/wk: {'starting_chapter': 4, 'weekly_chapters': 4, 'target_chapter_at_30_days': 19, 'skip_list': [1, 2, 3]}
    copywriter @ 10 hrs/wk: {'starting_chapter': 1, 'weekly_chapters': 1, 'target_chapter_at_30_days': 4, 'skip_list': []}
  normalize: collapse-trailing-newline
solution: |
  engineer = {"background": "engineer", "hours_per_week": 20}
  copywriter = {"background": "copywriter", "hours_per_week": 10}

  def make_30_day_plan(profile):
      background = profile["background"]
      hours = profile["hours_per_week"]
      if background == "engineer":
          starting_chapter = 4
          skip_list = [1, 2, 3]
          weekly_chapters = max(2, hours // 5)
      elif background == "designer":
          starting_chapter = 1
          skip_list = []
          weekly_chapters = max(1, hours // 7)
      else:
          # copywriter, cs_rep, paralegal
          starting_chapter = 1
          skip_list = []
          weekly_chapters = max(1, hours // 8)
      target = min(30, starting_chapter + 4 * weekly_chapters - 1)
      return {
          "starting_chapter": starting_chapter,
          "weekly_chapters": weekly_chapters,
          "target_chapter_at_30_days": target,
          "skip_list": skip_list,
      }

  print(f"engineer @ 20 hrs/wk: {make_30_day_plan(engineer)}")
  print(f"copywriter @ 10 hrs/wk: {make_30_day_plan(copywriter)}")
hint:
  - level: 1
    body: "Branch on profile['background']. Engineer is the only special case for starting_chapter and skip_list. Designer gets the //7 divisor; copywriter / cs_rep / paralegal share the //8 divisor. Target chapter is a single formula, same for everyone."
  - level: 2
    body: "Engineer math: starting=4, weekly = max(2, 20//5) = max(2, 4) = 4, target = min(30, 4 + 4*4 - 1) = min(30, 19) = 19. Copywriter math: starting=1, weekly = max(1, 10//8) = max(1, 1) = 1, target = min(30, 1 + 4*1 - 1) = min(30, 4) = 4. Watch the integer-division order: hours // 5 evaluates before max()."
