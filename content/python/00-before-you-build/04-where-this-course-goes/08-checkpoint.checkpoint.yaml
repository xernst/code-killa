xp: 8
estSeconds: 240
concept: route-a-cohort-through-the-course
prompt: |
  Final drill of chapter zero. Write `route_learners(learners)` that
  takes a list of learner profile dicts and returns a dict with two
  keys:

  - `routes`: a list of tuples `(name, starting_chapter,
    target_chapter_at_30_days)`, in the same order as the input list.
  - `by_background`: a dict mapping background string -> integer
    count of learners with that background.

  Reuse the same routing rules from the previous lesson:

  - Engineer: starts at ch04, weekly_chapters = max(2, hours // 5).
  - Designer: starts at ch01, weekly_chapters = max(1, hours // 7).
  - Copywriter, cs_rep, paralegal: start at ch01,
    weekly_chapters = max(1, hours // 8).
  - target_chapter_at_30_days = min(30, starting_chapter + 4
    * weekly_chapters - 1).

  Five learners run, one per background. Expected output:
  ```
  routes:
  ('Maya', 4, 19)
  ('Devon', 1, 8)
  ('Priya', 1, 4)
  ('Jules', 1, 8)
  ('Sam', 1, 4)
  by_background: {'engineer': 1, 'copywriter': 1, 'cs_rep': 1, 'designer': 1, 'paralegal': 1}
  ```
starter: |
  learners = [
      {"name": "Maya",  "background": "engineer",   "hours_per_week": 20},
      {"name": "Devon", "background": "copywriter", "hours_per_week": 16},
      {"name": "Priya", "background": "cs_rep",     "hours_per_week": 8},
      {"name": "Jules", "background": "designer",   "hours_per_week": 14},
      {"name": "Sam",   "background": "paralegal",  "hours_per_week": 10},
  ]

  # define route_learners(learners) below

  result = route_learners(learners)
  print("routes:")
  for r in result["routes"]:
      print(r)
  print(f"by_background: {result['by_background']}")
solution: |
  learners = [
      {"name": "Maya",  "background": "engineer",   "hours_per_week": 20},
      {"name": "Devon", "background": "copywriter", "hours_per_week": 16},
      {"name": "Priya", "background": "cs_rep",     "hours_per_week": 8},
      {"name": "Jules", "background": "designer",   "hours_per_week": 14},
      {"name": "Sam",   "background": "paralegal",  "hours_per_week": 10},
  ]

  def _plan(background, hours):
      if background == "engineer":
          starting_chapter = 4
          weekly_chapters = max(2, hours // 5)
      elif background == "designer":
          starting_chapter = 1
          weekly_chapters = max(1, hours // 7)
      else:
          starting_chapter = 1
          weekly_chapters = max(1, hours // 8)
      target = min(30, starting_chapter + 4 * weekly_chapters - 1)
      return starting_chapter, target

  def route_learners(learners):
      routes = []
      by_background = {}
      for learner in learners:
          start, target = _plan(learner["background"], learner["hours_per_week"])
          routes.append((learner["name"], start, target))
          by_background[learner["background"]] = by_background.get(learner["background"], 0) + 1
      return {"routes": routes, "by_background": by_background}

  result = route_learners(learners)
  print("routes:")
  for r in result["routes"]:
      print(r)
  print(f"by_background: {result['by_background']}")
grader:
  kind: stdout-equality
  expected: |
    routes:
    ('Maya', 4, 19)
    ('Devon', 1, 8)
    ('Priya', 1, 4)
    ('Jules', 1, 8)
    ('Sam', 1, 4)
    by_background: {'engineer': 1, 'copywriter': 1, 'cs_rep': 1, 'designer': 1, 'paralegal': 1}
  normalize: collapse-trailing-newline
passThreshold: 0.66
hint:
  - level: 1
    body: "Extract the per-learner planning logic into a helper, then loop the list once. Build `routes` with `(name, start, target)` tuples in input order, and tally `by_background` with `dict.get(bg, 0) + 1`. The aggregate dict preserves insertion order in modern Python, so as long as you iterate learners in order, the by_background key order matches the expected output."
  - level: 2
    body: "Per-learner math: Maya (engineer, 20h) -> start=4, weekly=max(2,4)=4, target=min(30, 4+16-1)=19. Devon (copywriter, 16h) -> start=1, weekly=max(1,2)=2, target=min(30, 1+8-1)=8. Priya (cs_rep, 8h) -> start=1, weekly=1, target=4. Jules (designer, 14h) -> start=1, weekly=max(1, 14//7)=2, target=8. Sam (paralegal, 10h) -> start=1, weekly=1, target=4."
