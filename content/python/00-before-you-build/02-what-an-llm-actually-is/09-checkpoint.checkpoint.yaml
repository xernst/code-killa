solution: |
  framings = [
      {
          "statement": "An LLM returns a probability distribution over the next token, and the output is a sample from that distribution.",
          "correct": True,
      },
      {
          "statement": "When I correct an LLM mid-conversation, the model updates its weights so the next user sees the corrected answer.",
          "correct": False,
      },
      {
          "statement": "The model has no memory between API calls; the harness re-sends the conversation history every turn.",
          "correct": True,
      },
      {
          "statement": "Same weights plus different system prompt produces a different assistant personality.",
          "correct": True,
      },
      {
          "statement": "LLMs are essentially search engines that retrieve the most relevant answer from their training corpus.",
          "correct": False,
      },
  ]

  def classify_framings(framings):
      correct_count = sum(1 for f in framings if f["correct"])
      wrong_statements = [f["statement"] for f in framings if not f["correct"]]
      return (correct_count, wrong_statements)

  correct_count, wrong_statements = classify_framings(framings)
  print(f"correct: {correct_count}")
  print("wrong:")
  for s in wrong_statements:
      print(f"  - {s}")
