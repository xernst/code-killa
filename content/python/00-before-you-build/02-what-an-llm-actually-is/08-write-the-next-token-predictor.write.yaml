xp: 5
estSeconds: 240
concept: predict-next-token-by-hand
prompt: |
  You're going to write, by hand, the core operation that every LLM
  in the world performs billions of times a day.

  Write `predict_next_token(context, vocab_probs)` that takes:

  - `context`: a string — the text "so far." We don't use it inside
    the function (the real model would condition on it; we're
    simulating with a precomputed distribution). It's there to make
    the intent of the function readable.
  - `vocab_probs`: a dict mapping candidate next-token strings to
    their probabilities (floats summing to <= 1.0).

  Return a single string formatted exactly like this:
  ```
  "Paris" (97.0%)
  ```

  That is: the highest-probability token in double quotes, a space,
  then the probability as a percentage rounded to one decimal place,
  in parentheses.

  Two runs. Expected output:
  ```
  "Paris" (97.0%)
  "blue" (18.0%)
  ```

  Hint: `max(vocab_probs, key=vocab_probs.get)` gives you the key
  with the highest value. Then use an f-string with `{p*100:.1f}` to
  format the percentage.
starter: |
  france = {
      "Paris": 0.97,
      "the": 0.01,
      "located": 0.005,
      "in": 0.005,
      "a": 0.005,
  }

  color = {
      "blue": 0.18,
      "red": 0.15,
      "green": 0.13,
      "purple": 0.10,
      "the": 0.05,
  }

  # define predict_next_token(context, vocab_probs) below

  print(predict_next_token("The capital of France is", france))
  print(predict_next_token("My favorite color is", color))
grader:
  kind: stdout-equality
  expected: |
    "Paris" (97.0%)
    "blue" (18.0%)
  normalize: collapse-trailing-newline
solution: |
  france = {
      "Paris": 0.97,
      "the": 0.01,
      "located": 0.005,
      "in": 0.005,
      "a": 0.005,
  }

  color = {
      "blue": 0.18,
      "red": 0.15,
      "green": 0.13,
      "purple": 0.10,
      "the": 0.05,
  }

  def predict_next_token(context, vocab_probs):
      top = max(vocab_probs, key=vocab_probs.get)
      p = vocab_probs[top]
      return f'"{top}" ({p*100:.1f}%)'

  print(predict_next_token("The capital of France is", france))
  print(predict_next_token("My favorite color is", color))
hint:
  - level: 1
    body: "Two lines of real work. `top = max(vocab_probs, key=vocab_probs.get)` gives you the highest-probability token. Then build the return string with an f-string: `f'\"{top}\" ({vocab_probs[top]*100:.1f}%)'`. The `:.1f` format spec rounds to one decimal place."
  - level: 2
    body: "Watch the quotes. The output needs LITERAL double-quote characters around the token, e.g., `\"Paris\"`. The easiest way is to write the f-string with single quotes on the outside: `f'\"{top}\" (...)'`. That way the doubles inside are just characters."
