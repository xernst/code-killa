xp: 6
estSeconds: 180
concept: name-your-transferable-strength
prompt: |
  One last drill before chapter zero moves on. You just used `print()`
  and an f-string once. Now you'll use them three more times — same
  shape, no new syntax.

  The starter declares three variables that summarize where you came
  from and what you bring to AI work:

  - `old_role` (string) — what you used to do
  - `survived` (string) — the part of that job the model can't do
  - `advantage` (string) — the AI-era role that part transfers to

  Write three `print(f"...")` lines below them. The grader expects the
  exact sentences:

  ```
  Old role: paralegal
  What survived: verification
  AI-era advantage: verification expertise on LLM outputs
  ```

  Then change the three variable values at the top to match YOU. Don't
  pick what sounds impressive — pick what's true. The chapter promised
  you'd write code about your own situation, not someone else's. The
  grader runs against the template values, but the muscle is in
  rewriting the inputs to your real ones before you move on.
starter: |
  old_role = "paralegal"
  survived = "verification"
  advantage = "verification expertise on LLM outputs"

  # write three print() lines below using f-strings, one per variable.
  # the grader expects the sentences above, exactly.

grader:
  kind: stdout-equality
  expected: |
    Old role: paralegal
    What survived: verification
    AI-era advantage: verification expertise on LLM outputs
  normalize: collapse-trailing-newline
solution: |
  old_role = "paralegal"
  survived = "verification"
  advantage = "verification expertise on LLM outputs"

  print(f"Old role: {old_role}")
  print(f"What survived: {survived}")
  print(f"AI-era advantage: {advantage}")
passThreshold: 0.66
hint:
  - level: 1
    body: |
      Same shape as the line you wrote in step 6, just three times. Each
      line is `print(f"label: {variable}")`. The labels are `Old role`,
      `What survived`, and `AI-era advantage`. The variable names are
      already defined at the top of the starter.
  - level: 2
    body: |
      Here are the three lines:

      ```python
      print(f"Old role: {old_role}")
      print(f"What survived: {survived}")
      print(f"AI-era advantage: {advantage}")
      ```

      No `def`, no loops, no lists. The skill this drill checks is the
      same skill from step 6: drop a variable into a sentence using an
      f-string. The skill this drill *teaches* is naming your own
      transferable strength out loud, in code that runs.
