solution: |
  candidates = [
      {"name": "Boutique law firm",       "volume_per_week": 2,    "rules_explicit": False, "outcome_structured": False, "incumbent_avg_age_years": 30},
      {"name": "Insurance brokerage",     "volume_per_week": 200,  "rules_explicit": True,  "outcome_structured": True,  "incumbent_avg_age_years": 35},
      {"name": "PR agency",               "volume_per_week": 40,   "rules_explicit": False, "outcome_structured": False, "incumbent_avg_age_years": 15},
      {"name": "Bookkeeping for SMBs",    "volume_per_week": 300,  "rules_explicit": True,  "outcome_structured": True,  "incumbent_avg_age_years": 18},
      {"name": "VC investing",            "volume_per_week": 1,    "rules_explicit": False, "outcome_structured": False, "incumbent_avg_age_years": 25},
  ]

  def score_candidate(c):
      s = 0
      if c["volume_per_week"] >= 100:
          s += 30
      if c["rules_explicit"]:
          s += 25
      if c["outcome_structured"]:
          s += 25
      if c["incumbent_avg_age_years"] >= 20:
          s += 20
      return s

  def pick_industry(candidates):
      return max(candidates, key=score_candidate)["name"]

  print(f"best: {pick_industry(candidates)}")
