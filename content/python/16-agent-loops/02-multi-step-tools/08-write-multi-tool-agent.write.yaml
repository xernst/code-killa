solution: |
  TOOLS = {
      "search":    lambda q:   "https://news.example/ramen",
      "read_page": lambda url: "Tokyo's best ramen shops, 2026 guide.",
  }

  responses = iter([
      {"stop_reason": "tool_use", "content": [
          {"type": "tool_use", "id": "t1", "name": "search", "input": {"q": "ramen tokyo"}}
      ]},
      {"stop_reason": "tool_use", "content": [
          {"type": "tool_use", "id": "t2", "name": "read_page",
           "input": {"url": "https://news.example/ramen"}}
      ]},
      {"stop_reason": "end_turn", "content": [
          {"type": "text", "text": "found: Tokyo's best ramen shops, 2026 guide."}
      ]},
  ])

  def fake_model(messages):
      return next(responses)

  def run_agent(question):
      messages = [{"role": "user", "content": question}]
      for _ in range(5):
          response = fake_model(messages)
          if response["stop_reason"] == "end_turn":
              return response["content"][0]["text"]

          tool_uses = [b for b in response["content"] if b["type"] == "tool_use"]
          tool_results = []
          for tu in tool_uses:
              fn = TOOLS.get(tu["name"])
              out = fn(**tu["input"]) if fn else f"unknown tool: {tu['name']}"
              tool_results.append({
                  "type": "tool_result",
                  "tool_use_id": tu["id"],
                  "content": out,
              })

          messages.append({"role": "assistant", "content": response["content"]})
          messages.append({"role": "user", "content": tool_results})
      return "capped"

  print(run_agent("find the latest ramen news"))
