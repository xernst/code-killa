      {"stop_reason": "end_turn", "content": [
          {"type": "text", "text": "found: Tokyo's best ramen shops, 2026 guide."}
      ]},
  ])

  def fake_model(messages):
      return next(responses)

  # define run_agent(question) below

  print(run_agent("find the latest ramen news"))
