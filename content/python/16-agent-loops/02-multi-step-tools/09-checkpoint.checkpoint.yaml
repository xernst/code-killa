solution: |
  TOOLS = {
      "search":    lambda q:   f"results for {q}",
      "read_page": lambda url: f"<text from {url}>",
      "summarize": lambda text: text[:30],
  }

  good = iter([
      {"stop_reason": "tool_use", "content": [
          {"type": "tool_use", "id": "t1", "name": "search", "input": {"q": "ramen"}},
          {"type": "tool_use", "id": "t2", "name": "read_page", "input": {"url": "a.com"}},
      ]},
      {"stop_reason": "tool_use", "content": [
          {"type": "tool_use", "id": "t3", "name": "summarize", "input": {"text": "long article"}},
      ]},
      {"stop_reason": "end_turn", "content": [
          {"type": "text", "text": "found 2 sources on ramen"},
      ]},
  ])

  cap = iter([
      {"stop_reason": "tool_use", "content": [
          {"type": "tool_use", "id": "c1", "name": "search", "input": {"q": "x"}}
      ]},
      {"stop_reason": "tool_use", "content": [
          {"type": "tool_use", "id": "c2", "name": "search", "input": {"q": "y"}}
      ]},
      {"stop_reason": "tool_use", "content": [
          {"type": "tool_use", "id": "c3", "name": "search", "input": {"q": "z"}}
      ]},
  ])

  current = {"iter": good}

  def fake_model(messages):
      return next(current["iter"])

  def run_research_agent(question, max_iterations):
      messages = [{"role": "user", "content": question}]
      tools_called = 0
      for rounds in range(1, max_iterations + 1):
          response = fake_model(messages)
          if response["stop_reason"] == "end_turn":
              return {
                  "ok": True,
                  "answer": response["content"][0]["text"],
                  "rounds": rounds,
                  "tools_called": tools_called,
              }

          tool_uses = [b for b in response["content"] if b["type"] == "tool_use"]
          tool_results = []
          for tu in tool_uses:
              fn = TOOLS.get(tu["name"])
              if fn:
                  out = fn(**tu["input"])
                  tools_called += 1
              else:
                  out = f"unknown tool: {tu['name']}"
              tool_results.append({
                  "type": "tool_result",
                  "tool_use_id": tu["id"],
                  "content": out,
              })

          messages.append({"role": "assistant", "content": response["content"]})
          messages.append({"role": "user", "content": tool_results})

      return {
          "ok": False,
          "answer": "capped",
          "rounds": max_iterations,
          "tools_called": tools_called,
      }

  current["iter"] = good
  r = run_research_agent("research ramen", 5)
  print(f"ok={r['ok']} rounds={r['rounds']} tools={r['tools_called']} answer={r['answer']}")

  current["iter"] = cap
  r = run_research_agent("loop forever", 2)
  print(f"ok={r['ok']} rounds={r['rounds']} tools={r['tools_called']} answer={r['answer']}")
