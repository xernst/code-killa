grader:
  kind: stdout-equality
  expected: "['policy/p2', 'policy/p4', 'policy/p7']"
  normalize: collapse-trailing-newline
hint:
  - level: 1
    body: "Sort by score first, then walk the sorted list keeping a `seen` set. Skip any chunk_id already in `seen`."
  - level: 2
    body: |
      ```python
      ranked = sorted(scored, key=lambda x: x[1], reverse=True)
      seen = set()
      out = []
      for c, s in ranked:
          if c not in seen:
              seen.add(c)
              out.append((c, s))
              if len(out) == k:
                  break
      return out
      ```
