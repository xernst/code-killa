concept: enumerate-vs-zip
code: |
  names = ["maya", "marcus", "priya"]
  scores = [95, 88, 71]

  # enumerate walks one list and gives you (index, value).
  # the task on the right is different: walk two lists side-by-side.
  for i, n in enumerate(names):
      print(i, n)
prompt: |
  Cursor wrote a loop that needs to walk **two** lists side-by-side —
  pairing each name with the score at the same position. Which built-in
  is the right reach?
options:
  - id: a
    label: "`enumerate`"
    explain: "`enumerate` gives you `(index, value)` from one list. It can't pair two lists."
  - id: b
    label: "`zip`"
  - id: c
    label: "`range(len(...))`"
    explain: "Works, but it's the long way. `zip` is what AI reaches for here."
  - id: d
    label: "`for n in names:` and a manual counter"
    explain: "That works too, but it's more code than `zip` for the same job."
answerIds:
  - b
