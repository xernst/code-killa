xp: 5
estSeconds: 200
concept: audit-rules-for-removal
prompt: |
  Write `audit_rules(rules)` that walks the ratchet log and returns a
  dict separating rules to keep from rules to retire:

  ```python
  {"kept": [<rule strings to keep>], "remove": [<rule strings to retire>]}
  ```

  A rule is marked for REMOVAL if `model_native_in_year <= 2025`
  (meaning the failure mode is handled natively by modern post-trained
  models or by current SDK defaults).

  Preserve INPUT ORDER in each list. Use only `rule` strings (not full
  dicts) in the output.

  Three rules run for you. Expected output:

  ```
  kept: ['no force push to main', 'run tsc before declaring done']
  remove: ['always specify temperature explicitly', 'always think step by step']
  ```
starter: |
  rules = [
      {"rule": "always specify temperature explicitly", "model_native_in_year": 2024},
      {"rule": "no force push to main",                  "model_native_in_year": 9999},
      {"rule": "run tsc before declaring done",          "model_native_in_year": 9999},
      {"rule": "always think step by step",              "model_native_in_year": 2023},
  ]

  # define audit_rules(rules) below

  result = audit_rules(rules)
  print(f"kept: {result['kept']}")
  print(f"remove: {result['remove']}")
grader:
  kind: stdout-equality
  expected: |
    kept: ['no force push to main', 'run tsc before declaring done']
    remove: ['always specify temperature explicitly', 'always think step by step']
  normalize: collapse-trailing-newline
solution: |
  rules = [
      {"rule": "always specify temperature explicitly", "model_native_in_year": 2024},
      {"rule": "no force push to main",                  "model_native_in_year": 9999},
      {"rule": "run tsc before declaring done",          "model_native_in_year": 9999},
      {"rule": "always think step by step",              "model_native_in_year": 2023},
  ]

  def audit_rules(rules):
      kept = []
      remove = []
      for r in rules:
          if r.get("model_native_in_year", 9999) <= 2025:
              remove.append(r["rule"])
          else:
              kept.append(r["rule"])
      return {"kept": kept, "remove": remove}

  result = audit_rules(rules)
  print(f"kept: {result['kept']}")
  print(f"remove: {result['remove']}")
hint:
  - level: 1
    body: "One loop over rules, branch on `model_native_in_year <= 2025`. Use `.get('model_native_in_year', 9999)` so missing fields default to 'definitely keep'. Append the `rule` string (not the dict) to the right list."
  - level: 2
    body: "The 9999 sentinel means 'no known year when the model handles this natively' — i.e., the rule is still earning its place. Two rules in the demo have years <= 2025: temperature (2024) and think-step-by-step (2023)."
