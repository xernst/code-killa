title: "claude skills for teams, your playbooks as ai your whole team shares"
blurb: "a claude skill is a packaged set of instructions, your team's playbook, that claude loads when it is relevant so nobody has to re-explain it. this chapter is for people who manage teams. it covers what a skill is, how a team shares and provisions skills, real examples for hr, legal, and ops work, when a skill beats a one-off prompt, and the governance you need before any skill touches real work."
