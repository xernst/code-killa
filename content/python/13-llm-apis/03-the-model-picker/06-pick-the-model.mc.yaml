concept: pick-model-from-tradeoffs
code: |
  # four product scenarios with the volume / quality / latency
  # tradeoffs spelled out. for each, you have to pick the model
  # that wins on the actual cost-vs-quality math, not the default.

  scenarios = [
      "A: Tag 500k support tickets/day with one of 12 categories. Quality must be ~95%+, but a 2% miss rate is recoverable (human triage catches the fallout).",
      "B: Once a quarter, review a 40-page acquisition contract and surface risk clauses for the legal team. Runs maybe 6 times a year.",
      "C: A real-time autocomplete for an IDE. Suggestions appear inline as the user types. Latency budget: under 200ms to first token. Volume: ~10 calls/keystroke, millions/day.",
      "D: A coding agent loop that picks one of 20 tools per turn, calls it, reads the result, and decides what to do next. Runs hundreds of times a day per active user.",
  ]
  for s in scenarios:
      print(s)
prompt: |
  Four scenarios, four models. Match each scenario to the BEST
  model given the volume Ă— stakes Ă— latency tradeoff. Which
  assignment is right?
