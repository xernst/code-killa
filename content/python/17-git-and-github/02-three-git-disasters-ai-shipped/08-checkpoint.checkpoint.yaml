solution: |
  repos = [
      {
          "name": "core-api",
          "has_gitignore_for_env": True,
          "has_secret_scanning_hook": True,
          "reviewer_required_for_main": True,
          "agent_can_auto_commit": False,
          "secrets_in_env_vars_only": True,
      },
      {
          "name": "admin-dashboard",
          "has_gitignore_for_env": True,
          "has_secret_scanning_hook": False,
          "reviewer_required_for_main": True,
          "agent_can_auto_commit": True,
          "secrets_in_env_vars_only": True,
      },
      {
          "name": "ml-pipeline",
          "has_gitignore_for_env": True,
          "has_secret_scanning_hook": False,
          "reviewer_required_for_main": False,
          "agent_can_auto_commit": True,
          "secrets_in_env_vars_only": True,
      },
      {
          "name": "legacy-billing",
          "has_gitignore_for_env": False,
          "has_secret_scanning_hook": False,
          "reviewer_required_for_main": False,
          "agent_can_auto_commit": True,
          "secrets_in_env_vars_only": False,
      },
      {
          "name": "docs-site",
          "has_gitignore_for_env": True,
          "has_secret_scanning_hook": True,
          "reviewer_required_for_main": True,
          "agent_can_auto_commit": True,
          "secrets_in_env_vars_only": True,
      },
  ]

  def score_one(repo):
      s = 0
      if repo.get("has_gitignore_for_env"):
          s += 20
      if repo.get("has_secret_scanning_hook"):
          s += 20
      if repo.get("reviewer_required_for_main"):
          s += 20
      if not repo.get("agent_can_auto_commit"):
          s += 20
      if repo.get("secrets_in_env_vars_only"):
          s += 20
      return s

  def triage_repos(repos):
      scores = {r["name"]: score_one(r) for r in repos}
      riskiest = min(repos, key=score_one)["name"]
      return scores, riskiest

  scores, riskiest = triage_repos(repos)
  print(f"scores: {scores}")
  print(f"most likely to leak next: {riskiest}")
