concept: triage-a-portfolio-of-repos
prompt: |
  Final drill. You're the new security lead on a five-repo
  engineering org. Walk through the portfolio and triage.

  Write `triage_repos(repos)` that takes a list of repo dicts (same
  shape as the previous step) and returns a tuple
  `(scores, riskiest)`:

  - `scores`: a dict mapping each repo's name → its score (0-100),
    using the same scoring rules as `audit_repo`:
    - +20 for `has_gitignore_for_env` True
    - +20 for `has_secret_scanning_hook` True
    - +20 for `reviewer_required_for_main` True
    - +20 for `agent_can_auto_commit` **False** (inverted)
    - +20 for `secrets_in_env_vars_only` True
  - `riskiest`: the name of the repo with the LOWEST score (most
    likely to leak next). On a tie, return the FIRST one — use
    `min` with a `key=` argument and a stable iteration over the
    input list.

  Five repos run. Expected output:
  ```
  scores: {'core-api': 100, 'admin-dashboard': 60, 'ml-pipeline': 40, 'legacy-billing': 0, 'docs-site': 80}
  most likely to leak next: legacy-billing
  ```
