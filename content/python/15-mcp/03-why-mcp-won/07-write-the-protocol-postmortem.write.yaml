xp: 5
estSeconds: 200
concept: protocol-postmortem
prompt: |
  Write `audit_protocol(spec)` that takes a protocol spec (dict) and
  returns a dict with two fields:

  - `score`: integer 0-100, higher means more likely to WIN
  - `verdict`: string, one of:
    - `"will-win"` if score >= 75
    - `"maybe"` if score >= 50
    - `"niche"` if score >= 25
    - `"dead-on-arrival"` if score < 25

  Score the spec on these four signals (each worth 25 points when `True`):

  - `open_spec`: 25 points (anyone can implement)
  - `multi_client`: 25 points (more than one host adopts it)
  - `low_publisher_bar`: 25 points (one file, no marketplace review)
  - `primitive_not_marketplace`: 25 points (developer wires it up, not end-user browse)

  Two protocols run. Expected output:
  ```
  MCP:            {'score': 100, 'verdict': 'will-win'}
  OpenAI Plugins: {'score': 0, 'verdict': 'dead-on-arrival'}
  ```
starter: |
  mcp = {
      "name": "MCP",
      "open_spec": True,
      "multi_client": True,
      "low_publisher_bar": True,
      "primitive_not_marketplace": True,
  }

  openai_plugins = {
      "name": "OpenAI Plugins",
      "open_spec": False,
      "multi_client": False,
      "low_publisher_bar": False,
      "primitive_not_marketplace": False,
  }

  # define audit_protocol(spec) below

  print(f"MCP:            {audit_protocol(mcp)}")
  print(f"OpenAI Plugins: {audit_protocol(openai_plugins)}")
grader:
  kind: stdout-equality
  expected: |
    MCP:            {'score': 100, 'verdict': 'will-win'}
    OpenAI Plugins: {'score': 0, 'verdict': 'dead-on-arrival'}
  normalize: collapse-trailing-newline
solution: |
  mcp = {
      "name": "MCP",
      "open_spec": True,
      "multi_client": True,
      "low_publisher_bar": True,
      "primitive_not_marketplace": True,
  }

  openai_plugins = {
      "name": "OpenAI Plugins",
      "open_spec": False,
      "multi_client": False,
      "low_publisher_bar": False,
      "primitive_not_marketplace": False,
  }

  def audit_protocol(spec):
      signals = [
          "open_spec",
          "multi_client",
          "low_publisher_bar",
          "primitive_not_marketplace",
      ]
      score = 0
      for s in signals:
          if spec.get(s):
              score += 25
      if score >= 75:
          verdict = "will-win"
      elif score >= 50:
          verdict = "maybe"
      elif score >= 25:
          verdict = "niche"
      else:
          verdict = "dead-on-arrival"
      return {"score": score, "verdict": verdict}

  print(f"MCP:            {audit_protocol(mcp)}")
  print(f"OpenAI Plugins: {audit_protocol(openai_plugins)}")
hint:
  - level: 1
    body: "Four boolean signals, each worth 25 points. Use `.get()` with a default of False so missing keys don't crash. Then a four-way threshold for the verdict (>=75, >=50, >=25, else)."
  - level: 2
    body: "MCP hits all four signals: 25 + 25 + 25 + 25 = 100, verdict 'will-win'. OpenAI Plugins hits zero, score 0, verdict 'dead-on-arrival'. The verdict thresholds: >=75 will-win, >=50 maybe, >=25 niche, <25 dead-on-arrival."
